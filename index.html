<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>세건 패키지 | 산업용 포장자재 도소매 전문업체</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Malgun Gothic',sans-serif;
    color:#333;
    line-height:1.7;
}

a{
    text-decoration:none;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */

header{
    background:#0f2747;
    color:white;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
}

.logo{
    display:flex;
    flex-direction:column;
}

.logo-main{
    font-size:36px;
    font-weight:bold;
    letter-spacing:3px;
}

.logo-sub{
    font-size:14px;
    opacity:.8;
}

.menu{
    display:flex;
    gap:35px;
}

.menu a{
    color:white;
    font-size:16px;
    transition:0.3s;
}

.menu a:hover{
    color:#90caf9;
}

/* HERO */

.hero{
    background:
    linear-gradient(
        rgba(15,39,71,.82),
        rgba(15,39,71,.82)
    ),
    url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
    
    background-size:cover;
    background-position:center;
    
    color:white;
    min-height:85vh;
    
    display:flex;
    align-items:center;
    text-align:center;
}

.hero-content{
    width:100%;
}

.sg{
    font-size:90px;
    font-weight:900;
    letter-spacing:8px;
}

.company{
    font-size:54px;
    margin-top:10px;
    font-weight:bold;
}

.type{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
    line-height:1.5;
}

.desc{
    margin-top:35px;
    font-size:20px;
    opacity:.9;
}

.oper{
    margin-top:15px;
    font-size:16px;
    opacity:.8;
}

.buttons{
    margin-top:50px;
}

.btn{
    display:inline-block;
    padding:16px 35px;
    border-radius:5px;
    margin:10px;
    font-size:18px;
    transition:.3s;
}

.btn-main{
    background:#1565c0;
    color:white;
}

.btn-sub{
    border:2px solid white;
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}

/* SECTION */

section{
    padding:100px 0;
}

.section-title{
    text-align:center;
    font-size:42px;
    color:#0f2747;
    margin-bottom:60px;
}

/* INFO */

.info{
    background:#f5f7fa;
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.info-card{
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.info-card h3{
    color:#0f2747;
    margin-bottom:20px;
}

/* MOBILE */

@media(max-width:768px){

.menu{
    display:none;
}

.sg{
    font-size:60px;
}

.company{
    font-size:36px;
}

.type{
    font-size:22px;
}

.desc{
    font-size:16px;
}

.btn{
    width:80%;
    display:block;
    margin:15px auto;
}

.section-title{
    font-size:30px;
}

}
</style>
</head>

<body>

<header>

<div class="container">

<nav>

<div class="logo">

<div class="logo-main">
SG
</div>

<div class="logo-sub">
세건 패키지
</div>

</div>

<div class="menu">
<a href="#about">회사소개</a>
<a href="#product">취급품목</a>
<a href="#strength">경쟁력</a>
<a href="#contact">견적문의</a>
<a href="#location">오시는 길</a>
</div>

</nav>

</div>

</header>

<section class="hero">

<div class="container">

<div class="hero-content">

<div class="sg">
SG
</div>

<div class="company">
세건 패키지
</div>

<div class="type">
산업용 포장자재<br>
도소매 전문업체
</div>

<div class="oper">
운영 : 세건상사
</div>

<div class="desc">
15년 이상의 신뢰와 경험<br>
포장에 필요한 모든 자재를 원스톱으로 공급합니다
</div>

<div class="buttons">

<a href="#contact" class="btn btn-main">
견적 문의
</a>

<a href="tel:01032608739" class="btn btn-sub">
전화 문의
</a>

</div>

</div>

</div>

</section>

<section class="info">

<div class="container">

<h2 class="section-title">
세건 패키지
</h2>

<div class="info-grid">

<div class="info-card">
<h3>15년 이상의 경험</h3>
<p>
오랜 경험과 노하우를 바탕으로
산업용 포장자재를 공급합니다.
</p>
</div>

<div class="info-card">
<h3>원스톱 공급</h3>
<p>
포장에 필요한 모든 제품을
한 번에 공급합니다.
</p>
</div>

<div class="info-card">
<h3>신속한 납품</h3>
<p>
빠르고 정확한 납품 서비스를
제공합니다.
</p>
</div>

<div class="info-card">
<h3>합리적인 가격</h3>
<p>
고객 맞춤형 견적을
제공합니다.
</p>
</div>

</div>

</div>

</section>
